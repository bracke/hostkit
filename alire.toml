name = "hostkit"
description = "The host's own way: spawning, shells, links, executability"
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT OR Apache-2.0 WITH LLVM-exception"
website = ""
tags = ["os", "process", "portability"]

[[depends-on]]
gnat_native = "=15.2.1"

# Build dependencies in the development profile (-Og) too, not the default release
# (-O3). -O3 hid an uninitialised read in a sibling crate for months; it does not fix
# a bug, it only postpones it to someone else's machine.
[build-profiles]
"*" = "development"
